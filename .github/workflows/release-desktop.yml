name: Release — Desktop

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-latest
            target: x86_64-apple-darwin
            artifact: sonitus-macos-x86_64.dmg
          - runner: macos-latest
            target: aarch64-apple-darwin
            artifact: sonitus-macos-aarch64.dmg
          - runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: sonitus-linux-x86_64.AppImage
          - runner: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: sonitus-windows-x86_64.msi
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          targets: ${{ matrix.target }}

      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev libgtk-3-dev libwebkit2gtk-4.1-dev pkg-config

      - name: Install dx (Dioxus CLI)
        shell: bash
        run: cargo install dioxus-cli --locked

      - uses: Swatinem/rust-cache@v2

      - name: Bundle release
        run: dx bundle --platform desktop --release --target ${{ matrix.target }}

      - name: macOS — sign + notarize
        if: runner.os == 'macOS' && github.event_name == 'push'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_APP_PASSWORD: ${{ secrets.APPLE_APP_PASSWORD }}
        run: |
          # Code-signing + notarization steps. Skipped if secrets are absent.
          if [ -n "$APPLE_ID" ] && [ -n "$APPLE_TEAM_ID" ]; then
            xcrun notarytool submit ./dist/*.dmg \
              --apple-id "$APPLE_ID" \
              --team-id "$APPLE_TEAM_ID" \
              --password "$APPLE_APP_PASSWORD" \
              --wait
            xcrun stapler staple ./dist/*.dmg
          fi

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/

  release:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
