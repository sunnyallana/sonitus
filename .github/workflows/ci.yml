name: CI

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: clippy
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --all-features -- -D warnings

  test:
    name: test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Linux build deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-features --no-fail-fast

  audit:
    name: cargo-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install cargo-audit
        run: cargo install cargo-audit --locked
      - run: cargo audit --deny warnings

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.95.0
      - name: Install cargo-deny
        run: cargo install cargo-deny --locked
      - run: cargo deny check

  privacy-policy-check:
    name: privacy guarantees enforcement
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Refuse banned crates in Cargo.lock
        run: |
          set -euxo pipefail
          # Quick sanity grep — deny.toml is authoritative; this is a backup signal
          # for human reviewers reading PR diffs.
          BANNED='sentry|segment|amplitude|crashlytics|datadog|rollbar|honeycomb|posthog|mixpanel|newrelic'
          if grep -E "name = \"($BANNED)\"" Cargo.lock 2>/dev/null; then
            echo "::error::Banned telemetry crate found in Cargo.lock"
            exit 1
          fi
      - name: Refuse native-tls
        run: |
          if grep -E '^name = "native-tls"' Cargo.lock 2>/dev/null; then
            echo "::error::native-tls found — Sonitus uses rustls only"
            exit 1
          fi
      - name: Verify migrations stay numbered + ordered
        run: |
          ls -1 migrations/ | grep -E '^[0-9]+_' | sort -c

  msrv:
    name: minimum supported Rust version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@1.85
      - name: Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libdbus-1-dev pkg-config
      - run: cargo build --workspace --all-features
